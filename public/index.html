<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web 1v1 Arena</title>
  <style>
    :root {
      --bg: #10141a;
      --panel: #1b2430;
      --line: #2f3e54;
      --text: #e8edf5;
      --muted: #9fb0c8;
      --accent: #2bffb8;
      --danger: #e45858;
      --p1: #4f8cff;
      --p2: #ff5a70;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1b2736 0, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: min(1060px, 100%);
      display: grid;
      gap: 12px;
      grid-template-columns: 260px 1fr;
    }
    .panel {
      background: color-mix(in oklab, var(--panel), black 10%);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }
    .title { margin: 0 0 8px; font-size: 18px; font-weight: 700; }
    .sub { margin: 0 0 12px; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    button, input {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0f1622;
      color: var(--text);
      padding: 10px;
      font-size: 14px;
    }
    input { width: 100%; text-transform: uppercase; }
    input.normal-case { text-transform: none; }
    button {
      cursor: pointer;
      background: color-mix(in oklab, var(--accent), black 65%);
      border-color: color-mix(in oklab, var(--accent), black 40%);
      font-weight: 600;
    }
    button.secondary {
      background: #162334;
      border-color: #2b3f57;
    }
    .icon-btn {
      min-width: 44px;
      padding: 10px 12px;
      font-size: 18px;
      line-height: 1;
    }
    #toggleControlsBtn.toggle-on {
      background: #0f4a34;
      border-color: #2bffb8;
      color: #b8ffe7;
    }
    #toggleControlsBtn.toggle-off {
      background: #223147;
      border-color: #3a516f;
      color: #b8c8dc;
    }
    .meta { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .scoreboard {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #35506f;
      border-radius: 10px;
      background: #111a27;
    }
    .scoreboard-title {
      margin: 0 0 6px;
      font-size: 12px;
      color: #8ea6c3;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .scoreboard-main {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
      color: #edf4ff;
      line-height: 1.2;
    }
    .scoreboard-sub {
      margin: 6px 0 0;
      font-size: 13px;
      color: #9fb0c8;
    }
    .restart-prompt {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #516a8a;
      border-radius: 10px;
      background: #162133;
      display: none;
    }
    .restart-prompt p {
      margin: 0 0 8px;
      font-size: 13px;
      color: #d8e6ff;
    }
    .challenge-prompt {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #516a8a;
      border-radius: 10px;
      background: #162133;
      display: none;
    }
    .challenge-prompt p {
      margin: 0 0 8px;
      font-size: 13px;
      color: #d8e6ff;
    }
    .status { margin-top: 8px; font-size: 13px; min-height: 18px; color: var(--accent); }
    .error { color: var(--danger); }
    .lobby-box {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #35506f;
      border-radius: 10px;
      background: #101929;
    }
    .lobby-title {
      margin: 0 0 8px;
      color: #9eb8d8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }
    .lobby-list {
      max-height: 120px;
      overflow: auto;
      display: grid;
      gap: 6px;
    }
    .lobby-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border: 1px solid #2d4260;
      border-radius: 8px;
      background: #0d1624;
      font-size: 13px;
    }
    .mini-btn {
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px;
    }
    .feed {
      margin-top: 10px;
      max-height: 88px;
      overflow: auto;
      font-size: 12px;
      color: #b9c9de;
      line-height: 1.35;
    }
    .feed p { margin: 0 0 5px; }
    .activity {
      margin-top: 10px;
      max-height: 140px;
      overflow: auto;
      font-size: 12px;
      color: #dbe7f8;
      line-height: 1.35;
    }
    .activity p { margin: 0 0 6px; }
    .activity .time {
      color: #8fb1d8;
      margin-right: 6px;
    }
    .activity .name {
      color: #ffd27f;
      margin-right: 6px;
    }
    body.in-match .pregame-only {
      display: none !important;
    }
    body:not(.in-match) .match-only {
      display: none !important;
    }
    body:not(.match-over) .match-over-only {
      display: none !important;
    }
    canvas {
      width: 100%;
      aspect-ratio: 5 / 3;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0e1218;
      display: block;
      touch-action: none;
    }
    .mobile-controls {
      display: none;
      position: fixed;
      inset: auto 0 14px 0;
      padding: 0 14px;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      z-index: 30;
    }
    .joystick-base {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.28);
      background: rgba(10, 15, 22, 0.45);
      position: relative;
      pointer-events: auto;
      touch-action: none;
      backdrop-filter: blur(2px);
    }
    .move-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      pointer-events: auto;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 36px);
      grid-template-rows: repeat(3, 36px);
      gap: 4px;
      pointer-events: auto;
    }
    .dpad-btn {
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(20, 31, 45, 0.85);
      color: #dff0ff;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
      padding: 0;
      touch-action: none;
      user-select: none;
      min-width: 36px;
      min-height: 36px;
    }
    .dpad-btn:active {
      background: rgba(43, 255, 184, 0.3);
      border-color: #2bffb8;
    }
    .dpad-spacer {
      width: 36px;
      height: 36px;
    }
    .joystick-knob {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(240, 248, 255, 0.7);
      position: absolute;
      left: 34px;
      top: 34px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    }
    .fire-btn {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      background: rgba(228, 88, 88, 0.35);
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.04em;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
    }
    .action-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }
    .reload-btn {
      min-width: 92px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      background: rgba(43, 255, 184, 0.22);
      color: #f1fff8;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 10px 14px;
      touch-action: none;
      user-select: none;
    }
    @media (max-width: 880px) {
      .app { grid-template-columns: 1fr; }
    }
    @media (hover: none), (pointer: coarse), (max-width: 900px) {
      body { padding-bottom: 150px; }
      .mobile-controls { display: flex; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <h1 class="title">1v1 Web Arena</h1>
      <p class="sub">WASD move, mouse aim, click shoot. Host on one PC, join from another.</p>

      <div class="row pregame-only">
        <button id="hostBtn">Create Room</button>
      </div>

      <div class="row pregame-only">
        <input id="roomInput" maxlength="8" placeholder="ROOM CODE" />
      </div>
      <div class="row pregame-only">
        <button id="joinBtn" class="secondary">Join Room</button>
      </div>

      <div class="row pregame-only">
        <input id="scoreLimitInput" type="number" min="1" max="50" value="5" placeholder="SCORE LIMIT" />
      </div>
      <div class="row pregame-only">
        <button id="setLimitBtn" class="secondary">Set Score Limit</button>
      </div>
      <div class="row">
        <button id="restartBtn" class="secondary match-only">Request Restart</button>
        <button id="quitBtn" class="secondary icon-btn" title="Quit Match">⏻</button>
      </div>
      <div class="row">
        <button id="soundBtn" class="secondary">Sound: On</button>
        <button id="toggleControlsBtn" class="secondary toggle-off">&#x1F579;&#xFE0F; AUTO</button>
      </div>
      <div class="row pregame-only">
        <input id="nameInput" class="normal-case" maxlength="16" placeholder="Your Name" />
      </div>
      <div class="row pregame-only">
        <button id="setNameBtn" class="secondary">Set Name</button>
      </div>
      <div class="row pregame-only">
        <button id="quickMatchBtn">Start Match</button>
        <button id="cancelQuickBtn" class="secondary">Cancel</button>
      </div>

      <p class="meta" id="roomLabel">Room: -</p>
      <p class="meta" id="playersLabel">Players: 0/2</p>
      <p class="meta pregame-only" id="onlineLabel">Online: 0</p>
      <section class="scoreboard">
        <p class="scoreboard-title">Scoreboard</p>
        <p id="scoreMain" class="scoreboard-main">Me 0 - 0 Enemy</p>
        <p id="scoreSub" class="scoreboard-sub">First to 5</p>
      </section>
      <div id="postMatchActions" class="row match-over-only" style="margin-top:10px;">
        <button id="continueBtn" class="secondary">Continue</button>
        <button id="restartMatchBtn">Restart</button>
      </div>
      <section class="lobby-box pregame-only">
        <p class="lobby-title">Online Players</p>
        <div id="onlineList" class="lobby-list"></div>
      </section>
      <section class="lobby-box pregame-only">
        <p class="lobby-title">Feed</p>
        <div id="feed" class="feed"></div>
      </section>
      <section class="lobby-box">
        <p id="chatTitle" class="lobby-title">Global Chat</p>
        <div id="chatList" class="activity"></div>
        <div class="row" style="margin-top:8px;">
          <input id="chatInput" class="normal-case" maxlength="120" placeholder="Type message..." />
          <button id="chatSendBtn" class="secondary">Send</button>
        </div>
      </section>
      <section id="challengePrompt" class="challenge-prompt">
        <p id="challengePromptText">Player challenged you.</p>
        <div class="row">
          <button id="challengeAcceptBtn">Accept</button>
          <button id="challengeDeclineBtn" class="secondary">Decline</button>
        </div>
      </section>
      <section id="restartPrompt" class="restart-prompt">
        <p id="restartPromptText">Opponent requested restart.</p>
        <div class="row">
          <button id="restartAcceptBtn">Accept</button>
          <button id="restartDeclineBtn" class="secondary">Decline</button>
        </div>
      </section>
      <p id="status" class="status">Connect and create/join a room.</p>
    </section>

    <section class="panel">
      <canvas id="gameCanvas" width="1000" height="600"></canvas>
    </section>
  </div>
  <div id="mobileControls" class="mobile-controls">
    <div class="move-stack">
      <div id="joystickBase" class="joystick-base">
        <div id="joystickKnob" class="joystick-knob"></div>
      </div>
      <div id="dpad" class="dpad">
        <div class="dpad-spacer"></div>
        <button id="upBtn" class="dpad-btn" aria-label="Move Up">▲</button>
        <div class="dpad-spacer"></div>
        <button id="leftBtn" class="dpad-btn" aria-label="Move Left">◀</button>
        <div class="dpad-spacer"></div>
        <button id="rightBtn" class="dpad-btn" aria-label="Move Right">▶</button>
        <div class="dpad-spacer"></div>
        <button id="downBtn" class="dpad-btn" aria-label="Move Down">▼</button>
        <div class="dpad-spacer"></div>
      </div>
    </div>
    <div class="action-stack">
      <button id="reloadBtn" class="reload-btn">RELOAD</button>
      <button id="fireBtn" class="fire-btn">FIRE</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
